<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Default SEO (overridden per-page by react-helmet-async) -->
  <title>BritBooks — Quality Second-Hand Books at Affordable Prices</title>
  <meta name="description" content="Shop thousands of quality second-hand and new books at BritBooks — affordable prices, fast UK delivery, and sustainable reading for everyone." />
  <link rel="canonical" href="https://www.britbooks.co.uk/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logobritr.png" />
  <link rel="apple-touch-icon" href="/logobritr.png" />

  <!-- Open Graph defaults -->
  <meta property="og:site_name" content="BritBooks" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="BritBooks — Quality Second-Hand Books at Affordable Prices" />
  <meta property="og:description" content="Shop thousands of quality second-hand and new books at BritBooks — affordable prices, fast UK delivery, and sustainable reading for everyone." />
  <meta property="og:url" content="https://www.britbooks.co.uk/" />
  <meta property="og:image" content="https://www.britbooks.co.uk/logobritr.png" />
  <meta property="og:locale" content="en_GB" />

  <!-- Twitter Card defaults -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BritBooks — Quality Second-Hand Books" />
  <meta name="twitter:description" content="Thousands of quality books at affordable prices with fast UK delivery." />
  <meta name="twitter:image" content="https://www.britbooks.co.uk/logobritr.png" />

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <!-- Organization structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "BritBooks",
    "url": "https://www.britbooks.co.uk",
    "logo": "https://www.britbooks.co.uk/logobritr.png",
    "description": "Quality second-hand and new books at affordable prices with fast UK delivery.",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "availableLanguage": "English"
    }
  }
  </script>

  <!-- Website search action structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "BritBooks",
    "url": "https://www.britbooks.co.uk",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://www.britbooks.co.uk/explore?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="module" src="/src/main.tsx"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
