name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.14.0'
  MONGOMS_PREFER_GLOBAL_PATH: '0'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum-xx' }}
          MONGOMS_SYSTEM_BINARY: ''

  # ─────────────────────────────────────────────
  # JOB 3: Integration Tests
  # ─────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binary-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: mongodb-binary-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum-xx' }}
          MONGOMS_SYSTEM_BINARY: ''
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

  # ─────────────────────────────────────────────
  # JOB 4: Security Tests
  # ─────────────────────────────────────────────
  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binary-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: mongodb-binary-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run security tests
        run: npm run test:security
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum-xx' }}
          MONGOMS_SYSTEM_BINARY: ''
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

  # ─────────────────────────────────────────────
  # JOB 5: Coverage Report
  # ─────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-unit, test-integration, test-security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binary-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: mongodb-binary-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum-xx' }}
          MONGOMS_SYSTEM_BINARY: ''
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 6: Build Docker Image (validate only on CI)
  # ─────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-unit, test-integration, test-security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: britbooks-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
