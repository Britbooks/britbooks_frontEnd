name: CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-flight deployments

env:
  NODE_VERSION: '20.14.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Require CI to pass first
  # ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: echo "CI passed — proceeding to CD"

  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci-gate
    permissions:
      contents: read
      packages: write
      id-token: write  # for OIDC / cosign

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}

      - name: Output image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────
  # JOB 2: Container Security Scan
  # ─────────────────────────────────────────────
  scan-image:
    name: Scan Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-push
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'  # Set to '1' to fail on vulnerabilities

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: container-scanning

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-push, scan-image]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} to staging"
          # ─────────────────────────────────────────────────────────────
          # Replace this block with your actual deployment command:
          #
          # Railway:
          #   railway up --service britbooks-api
          #
          # Render:
          #   curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
          #
          # DigitalOcean App Platform:
          #   doctl apps create-deployment ${{ secrets.DO_STAGING_APP_ID }}
          #
          # SSH to VPS:
          #   ssh user@host "docker pull <image> && docker-compose up -d"
          # ─────────────────────────────────────────────────────────────
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Health check — staging
        run: |
          sleep 15
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            "${{ vars.STAGING_URL }}/health" | grep -q '"status"'
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Production (tag-gated)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-push, scan-image, deploy-staging]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} to production"
          # Replace with your production deploy command (same patterns as staging above)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Health check — production
        run: |
          sleep 15
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            "${{ vars.PRODUCTION_URL }}/health" | grep -q '"status"'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
